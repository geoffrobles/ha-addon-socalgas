name: SoCalGas Usage Importer
version: "1.0.4"
slug: socalgas_usage
description: Import SoCalGas usage into Home Assistant
startup: services
boot: auto

arch:
  - amd64
  - aarch64

options:
  email: ""
  password: ""
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""

schema:
  email: str
  password: password
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str?
  mqtt_password: password?

environment:
  SOCALGAS_EMAIL: email
  SOCALGAS_PASSWORD: password
  MQTT_HOST: mqtt_host
  MQTT_PORT: mqtt_port
  MQTT_USER: mqtt_user
  MQTT_PASSWORD: mqtt_password